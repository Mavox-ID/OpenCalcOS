name: "Test C++ Code Quality"

on:
  push:
    branches: [ main ]

jobs:
  check-cpp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Scan and Check C++ Files
        continue-on-error: true
        run: |
          echo "=== Checking the syntax of C++ files ==="
          find . -type f \( -name "*.cpp" -o -name "*.hpp" \) -not -path "*/ndless/*" | while read -r file; do
            echo "Checking: $file"
            g++ -Wall -Wextra -fsyntax-only -std=c++17 "$file" || echo "Error/Warning: $file"
          done
