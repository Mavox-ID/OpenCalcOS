name: Build and Release OCOS

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          submodules: recursive
          fetch-depth: 0
          
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Install ARM toolchain and tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            lzop \
            zip \
            unzip \
            build-essential \
            autoconf \
            automake \
            gettext \
            autopoint \
            libgmp-dev \
            libmpfr-dev \
            libmpc-dev \
            texinfo \
            bison \
            flex \
            libboost-program-options-dev \
            zlib1g-dev

      - name: Sync to build branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout -B build
          git rm -rf -q . || rm -rf * > /dev/null 2>&1
          git checkout -q main -- .
          unzip -o calcfs.zip

      - name: Restore Ndless Toolchain Cache
        id: cache-toolchain
        uses: actions/cache/restore@v4
        with:
          path: ndless/ndless-sdk/toolchain/install
          key: Linux-ndless-toolchain-v1

      - name: Build OpenCalcOS
        run: bash build.sh

      - name: Save Ndless Toolchain Cache
        if: always() && steps.cache-toolchain.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ndless/ndless-sdk/toolchain/install
          key: Linux-ndless-toolchain-v1

      - name: Process version and pack build folder
        run: |
          VERSION_STR=$(cat tools/.version | tr -d '\r\n ')
          echo "VERSION=$VERSION_STR" >> $GITHUB_ENV
          
          mkdir -p build
          echo "Latest version release: $VERSION_STR" > build/VERSION
          
          cd build
          zip -r ../OCOS-v${VERSION_STR}.zip .
          cd ..
          
          git add .
          git add -f build/
          git add -f OCOS-v${VERSION_STR}.zip
          
          git commit -m "Build version v${VERSION_STR}" || echo "No changes to commit"
          git push origin build --force

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ env.VERSION }}" "OCOS-v${{ env.VERSION }}.zip" \
            --title "${{ env.VERSION }}" \
            --notes "Latest version release: ${{ env.VERSION }}" \
            --target build \
            || gh release upload "${{ env.VERSION }}" "OCOS-v${{ env.VERSION }}.zip" --clobber
